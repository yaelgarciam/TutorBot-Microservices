version: '3.9'

services:
  eureka-server:
    build:
      context: ../backend/eureka-server
    ports:
      - '8761:8761'

  api-gateway:
    build:
      context: ../backend/api-gateway
    ports:
      - '8080:8080'
    depends_on:
      - eureka-server

  session-service:
    build:
      context: ../backend/session-service
    ports:
      - '8081:8081'
    depends_on:
      - eureka-server
      - redis

  evaluator-service:
    build:
      context: ../backend/evaluator-service
    ports:
      - '8082:8082'
    depends_on:
      - eureka-server
      - rabbitmq
      - oracle
      - ollama

  exercise-service:
    build:
      context: ../backend/exercise-service
    ports:
      - '8083:8083'
    depends_on:
      - eureka-server
      - mongodb
      - rabbitmq
      - solr
      - ollama

  gap-detector-service:
    build:
      context: ../backend/gap-detector-service
    ports:
      - '8084:8084'
    depends_on:
      - eureka-server
      - rabbitmq
      - oracle

  learning-path-service:
    build:
      context: ../backend/learning-path-service
    ports:
      - '8085:8085'
    depends_on:
      - eureka-server
      - mongodb
      - rabbitmq

  notifier-service:
    build:
      context: ../backend/notifier-service
    ports:
      - '8086:8086'
    depends_on:
      - eureka-server
      - rabbitmq
      - redis

  redis:
    image: redis:7.2-alpine
    ports:
      - '6379:6379'

  rabbitmq:
    image: rabbitmq:3.13-management
    ports:
      - '5672:5672'
      - '15672:15672'

  mongodb:
    image: mongo:7.0
    ports:
      - '27017:27017'

  solr:
    image: solr:9.6
    ports:
      - '8983:8983'
    command:
      - solr-precreate
      - tutorbot-exercises

  ollama:
    image: ollama/ollama:latest
    ports:
      - '11434:11434'

  oracle:
    image: gvenzl/oracle-free:23-slim
    environment:
      ORACLE_PASSWORD: tutorbot
      APP_USER: tutorbot
      APP_USER_PASSWORD: tutorbot
    ports:
      - '1521:1521'

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.14.3
    environment:
      discovery.type: single-node
      xpack.security.enabled: 'false'
    ports:
      - '9200:9200'

  logstash:
    image: docker.elastic.co/logstash/logstash:8.14.3
    depends_on:
      - elasticsearch

  kibana:
    image: docker.elastic.co/kibana/kibana:8.14.3
    depends_on:
      - elasticsearch
    ports:
      - '5601:5601'
