# Dev profile: Spring runs local, Oracle runs in Docker
spring.datasource.url=jdbc:oracle:thin:@localhost:1522/XEPDB1
spring.datasource.username=tutorbot
spring.datasource.password=tutorbot123

# Disable Eureka registration in dev (no Eureka server needed)
eureka.client.enabled=false

# RabbitMQ — disabled by default for students; set to true to enable
tutorbot.messaging.enabled=true
# spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.amqp.RabbitAutoConfiguration
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672

# Ollama dev
ollama.base-url=http://localhost:11434
ollama.model=llama3
ollama.timeout=60000

# Show health details
management.endpoint.health.show-details=always
