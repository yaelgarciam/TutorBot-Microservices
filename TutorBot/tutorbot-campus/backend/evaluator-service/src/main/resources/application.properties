spring.application.name=evaluator-service
server.port=8082

# Oracle DataSource
spring.datasource.url=jdbc:oracle:thin:@oracledb:1522/TESTDB
spring.datasource.username=Adolfo
spring.datasource.password=password
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

# JPA / Hibernate — validate: existing Oracle tables, do NOT recreate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.OracleDialect

# SQL init
spring.sql.init.mode=never

# Messaging (RabbitMQ) — true in production, override to false in dev
tutorbot.messaging.enabled=true

# Ollama LLM
ollama.base-url=http://localhost:11434
ollama.model=llama3
ollama.timeout=30000
